<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="naver-site-verification" content="" />
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="/logo_dark.svg" />
    <script>
      (function () {
        var STORAGE_KEY = "goldrise-theme";
        var DARK_ICON = "/logo_dark.svg";
        var LIGHT_ICON = "/logo_light.svg";

        function getResolvedTheme() {
          var saved = localStorage.getItem(STORAGE_KEY);
          if (saved === "dark" || saved === "light") return saved;
          return "light";
        }

        function setFavicon(theme) {
          var el = document.getElementById("app-favicon");
          if (!el) return;
          el.setAttribute("href", theme === "dark" ? DARK_ICON : LIGHT_ICON);
        }

        function resolveThemeFromClass() {
          var root = document.documentElement;
          if (root.classList.contains("dark")) return "dark";
          if (root.classList.contains("light")) return "light";
          return getResolvedTheme();
        }

        setFavicon(getResolvedTheme());

        function watchThemeChanges() {
          var root = document.documentElement;
          var observer = new MutationObserver(function () {
            setFavicon(resolveThemeFromClass());
          });
          observer.observe(root, { attributes: true, attributeFilter: ["class"] });

          var media = window.matchMedia("(prefers-color-scheme: dark)");
          media.addEventListener("change", function () {
            if (localStorage.getItem(STORAGE_KEY) === "system") {
              setFavicon(getResolvedTheme());
            }
          });
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", watchThemeChanges, { once: true });
        } else {
          watchThemeChanges();
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
